services:
  - type: web
    name: intel-defect-classifier
    env: python
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install --no-cache-dir -r app/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
