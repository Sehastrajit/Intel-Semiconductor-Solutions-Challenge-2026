<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intel Defect Classifier</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      margin-bottom: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    p {
      color: #cbd5e1;
    }

    .upload-box {
      border: 2px dashed #475569;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      background: #0f172a;
    }

    input[type="file"] {
      margin-top: 12px;
      color: white;
    }

    button {
      margin-top: 18px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }

    .preview {
      margin-top: 20px;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid #334155;
    }

    .result h2 {
      margin-top: 0;
    }

    .pill {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: bold;
      margin-top: 8px;
      margin-bottom: 12px;
    }

    .good {
      background: #14532d;
      color: #bbf7d0;
    }

    .bad {
      background: #7f1d1d;
      color: #fecaca;
    }

    .top3 {
      margin-top: 14px;
    }

    .bar-wrap {
      margin-bottom: 12px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #3b82f6;
      width: 0%;
    }

    .error {
      color: #fca5a5;
      margin-top: 14px;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }

    .loading {
      color: #93c5fd;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Intel Defect Classifier</h1>
      <p>Upload a semiconductor image and get the predicted defect class.</p>

      <div class="upload-box">
        <label for="fileInput"><strong>Select an image</strong></label><br />
        <input type="file" id="fileInput" accept="image/*" />
        <br />
        <button id="predictBtn">Predict</button>
        <div id="loading" class="loading"></div>
        <div id="error" class="error"></div>

        <div class="preview" id="preview"></div>
      </div>
    </div>

    <div class="card result" id="resultCard" style="display:none;">
      <h2>Prediction Result</h2>
      <div><strong>Filename:</strong> <span id="filename"></span></div>
      <div><strong>Predicted Class:</strong> <span id="predictedClass"></span></div>
      <div><strong>Confidence:</strong> <span id="confidence"></span></div>
      <div id="statusPill"></div>

      <div class="top3">
        <h3>Top 3 Predictions</h3>
        <div id="top3Container"></div>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const predictBtn = document.getElementById("predictBtn");
    const preview = document.getElementById("preview");
    const resultCard = document.getElementById("resultCard");
    const filenameEl = document.getElementById("filename");
    const predictedClassEl = document.getElementById("predictedClass");
    const confidenceEl = document.getElementById("confidence");
    const top3Container = document.getElementById("top3Container");
    const errorEl = document.getElementById("error");
    const loadingEl = document.getElementById("loading");
    const statusPill = document.getElementById("statusPill");

    fileInput.addEventListener("change", () => {
      errorEl.textContent = "";
      resultCard.style.display = "none";
      preview.innerHTML = "";

      const file = fileInput.files[0];
      if (!file) return;

      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      preview.appendChild(img);
    });

    predictBtn.addEventListener("click", async () => {
      errorEl.textContent = "";
      loadingEl.textContent = "";
      resultCard.style.display = "none";

      const file = fileInput.files[0];
      if (!file) {
        errorEl.textContent = "Please select an image first.";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      try {
        predictBtn.disabled = true;
        loadingEl.textContent = "Running prediction...";

        const response = await fetch("/predict", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Prediction failed.");
        }

        filenameEl.textContent = data.filename;
        predictedClassEl.textContent = data.predicted_class;
        confidenceEl.textContent = (data.confidence * 100).toFixed(2) + "%";

        const isGood = data.predicted_class === "new_good";
        statusPill.innerHTML = `
          <span class="pill ${isGood ? "good" : "bad"}">
            ${isGood ? "GOOD" : "DEFECTIVE"}
          </span>
        `;

        top3Container.innerHTML = "";
        data.top_3.forEach(item => {
          const pct = (item.probability * 100).toFixed(2);

          const row = document.createElement("div");
          row.className = "bar-wrap";
          row.innerHTML = `
            <div class="bar-label">
              <span>${item.class}</span>
              <span>${pct}%</span>
            </div>
            <div class="bar">
              <div class="bar-fill" style="width:${pct}%"></div>
            </div>
          `;
          top3Container.appendChild(row);
        });

        resultCard.style.display = "block";
      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        predictBtn.disabled = false;
        loadingEl.textContent = "";
      }
    });
  </script>
</body>
</html>
